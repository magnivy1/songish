<!DOCTYPE html>
<!--
    SONGISH - Daily Vinyl Tracker

    SETUP INSTRUCTIONS:
    1. Create a new GitHub repository (e.g., "songish")
    2. Create a songs.json file in the repo with initial content: []
    3. Make the repository PUBLIC (so anyone can view without auth)
    4. Enable GitHub Pages: Settings > Pages > Deploy from branch (main)
    5. Update GITHUB_REPO variable below (line 332) to match: 'username/reponame'
    6. Upload this HTML file to the repo (e.g., as index.html)
    7. Access your site at: https://username.github.io/reponame/

    USAGE:
    - Everyone can VIEW songs (public access, no login required)
    - Only authenticated users can ADD/DELETE songs
    - To add songs: Click "Login to Add Songs" and enter GitHub Personal Access Token
    - Create token at: https://github.com/settings/tokens/new?scopes=repo
-->
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Songish - Daily Vinyl</title>
    <link href="https://fonts.googleapis.com/css2?family=Bangers&family=Open+Sans:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #ffeb3b;
            --secondary: #ff5722;
            --accent: #2196f3;
            --bg: #f0f0f0;
            --text: #1a1a1a;
        }

        body {
            font-family: 'Open Sans', sans-serif;
            background-color: var(--bg);
            background-image: radial-gradient(#ccc 10%, transparent 11%), radial-gradient(#ccc 10%, transparent 11%);
            background-size: 30px 30px;
            background-position: 0 0, 15px 15px;
            color: var(--text);
            margin: 0;
            padding: 20px;
        }

        .container { max-width: 800px; margin: 0 auto; }

        header {
            text-align: center;
            background: var(--primary);
            border: 4px solid black;
            padding: 20px;
            box-shadow: 10px 10px 0px black;
            margin-bottom: 40px;
            transform: rotate(-1deg);
        }

        h1 { font-family: 'Bangers', cursive; font-size: 4rem; margin: 0; letter-spacing: 2px; }

        .auth-container {
            background: white;
            border: 4px solid black;
            padding: 30px;
            box-shadow: 8px 8px 0px var(--secondary);
            margin-bottom: 30px;
            text-align: center;
            display: none;
        }

        .auth-container.show {
            display: block;
        }

        .auth-container input {
            width: 100%;
            padding: 12px;
            margin-bottom: 15px;
            border: 3px solid black;
            font-size: 1rem;
            box-sizing: border-box;
        }

        .auth-container button {
            background: var(--secondary);
            color: white;
            border: 3px solid black;
            padding: 12px 25px;
            font-family: 'Bangers', cursive;
            font-size: 1.2rem;
            cursor: pointer;
            box-shadow: 4px 4px 0px black;
        }

        .auth-container button:hover {
            background: var(--accent);
        }

        .form-container {
            background: white;
            border: 4px solid black;
            padding: 30px;
            box-shadow: 8px 8px 0px var(--primary);
            margin-bottom: 50px;
        }

        .form-container h2 {
            font-family: 'Bangers', cursive;
            font-size: 1.8rem;
            margin-top: 0;
            color: var(--secondary);
        }

        .form-group {
            margin-bottom: 20px;
            display: flex;
            flex-direction: column;
        }

        label {
            font-weight: bold;
            margin-bottom: 5px;
            color: var(--text);
        }

        input[type="text"],
        input[type="date"],
        input[type="url"],
        textarea {
            padding: 12px;
            border: 3px solid black;
            font-size: 1rem;
            font-family: 'Open Sans', sans-serif;
            box-shadow: 4px 4px 0px rgba(0,0,0,0.1);
        }

        textarea {
            resize: vertical;
            min-height: 80px;
        }

        input[type="text"]:focus,
        input[type="date"]:focus,
        input[type="url"]:focus,
        textarea:focus {
            outline: none;
            box-shadow: 4px 4px 0px var(--accent);
        }

        button {
            background: var(--secondary);
            color: white;
            border: 3px solid black;
            padding: 12px 25px;
            font-family: 'Bangers', cursive;
            font-size: 1.2rem;
            cursor: pointer;
            box-shadow: 4px 4px 0px black;
            transition: transform 0.1s;
        }

        button:hover {
            background: var(--accent);
            transform: translate(-2px, -2px);
            box-shadow: 6px 6px 0px black;
        }

        button:active {
            transform: translate(2px, 2px);
            box-shadow: 2px 2px 0px black;
        }

        .song-card {
            background: white;
            border: 4px solid black;
            padding: 30px;
            box-shadow: 8px 8px 0px var(--secondary);
            margin-bottom: 50px;
            position: relative;
        }

        .song-card::before {
            content: "LATEST HIT!";
            position: absolute;
            top: -20px;
            right: -20px;
            background: var(--secondary);
            color: white;
            padding: 10px;
            font-family: 'Bangers', cursive;
            border: 3px solid black;
            transform: rotate(5deg);
        }

        .search-container {
            margin-bottom: 30px;
            display: flex;
            gap: 10px;
        }

        input[type="text"].search {
            flex-grow: 1;
            padding: 15px;
            border: 3px solid black;
            font-size: 1.1rem;
            box-shadow: 4px 4px 0px black;
        }

        .history-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 20px;
        }

        .history-item {
            background: white;
            border: 3px solid black;
            padding: 15px;
            transition: transform 0.2s;
            position: relative;
        }

        .history-item:hover { transform: scale(1.02); }

        .history-item .delete-btn {
            position: absolute;
            top: 5px;
            right: 5px;
            background: var(--secondary);
            color: white;
            border: 2px solid black;
            padding: 3px 8px;
            font-size: 0.8rem;
            cursor: pointer;
            font-family: 'Bangers', cursive;
        }

        .history-item .delete-btn:hover {
            background: var(--accent);
        }

        .date { font-weight: bold; color: var(--accent); text-transform: uppercase; font-size: 0.8rem; }
        
        a.btn {
            display: inline-block;
            margin-top: 15px;
            background: black;
            color: white;
            padding: 10px 20px;
            text-decoration: none;
            font-family: 'Bangers', cursive;
            font-size: 1.2rem;
        }

        a.btn:hover { background: var(--accent); }

        hr { border: 2px solid black; margin: 40px 0; }

        .success-message {
            background: var(--primary);
            border: 3px solid black;
            padding: 15px;
            margin-bottom: 20px;
            font-weight: bold;
            display: none;
        }

        .success-message.show {
            display: block;
        }

        .loading {
            text-align: center;
            color: var(--accent);
            font-weight: bold;
        }

        .logout-btn {
            position: absolute;
            top: 20px;
            right: 20px;
            background: var(--secondary);
            color: white;
            border: 2px solid black;
            padding: 8px 15px;
            font-family: 'Bangers', cursive;
            cursor: pointer;
            font-size: 0.9rem;
        }

        .logout-btn:hover {
            background: var(--accent);
        }

        .info-banner {
            background: var(--accent);
            color: white;
            border: 3px solid black;
            padding: 15px;
            margin-bottom: 20px;
            text-align: center;
            font-weight: bold;
            box-shadow: 4px 4px 0px black;
        }

        .info-banner a {
            color: white;
            text-decoration: underline;
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>SONG OF THE DAY</h1>
        <p>A daily rhythm and personal thoughts by Magnivy.</p>
        <button class="logout-btn" id="loginBtn" style="display:none;">Login to Add Songs</button>
        <button class="logout-btn" id="logoutBtn" style="display:none;">Logout</button>
    </header>

    <div id="authContainer" class="auth-container">
        <h2>🔐 GitHub Authentication</h2>
        <p>Enter your GitHub Personal Access Token to add/delete songs.</p>
        <input type="password" id="tokenInput" placeholder="Enter GitHub Token (with repo access)">
        <p style="font-size: 0.9rem;"><a href="https://github.com/settings/tokens/new?scopes=repo&description=Songish" target="_blank">Create a token here</a></p>
        <button id="authBtn">Authenticate</button>
        <button id="cancelAuthBtn" style="background: #666; margin-left: 10px;">Cancel</button>
    </div>

    <div id="mainContent" style="display:none;">
        <div id="infoBanner" class="info-banner" style="display:none;">
            👀 Viewing mode - <a href="#" id="loginLink">Login with GitHub</a> to add your own songs
        </div>

        <div class="form-container">
            <h2>🎵 Add Today's Song</h2>
            <div id="successMessage" class="success-message">✓ Song saved to GitHub!</div>
            <form id="songForm">
                <div class="form-group">
                    <label for="songDate">Date</label>
                    <input type="date" id="songDate" required>
                </div>
                <div class="form-group">
                    <label for="songTitle">Song Title & Artist</label>
                    <input type="text" id="songTitle" placeholder="e.g., Artist - Song Name" required>
                </div>
                <div class="form-group">
                    <label for="songThoughts">Your Thoughts / Comments</label>
                    <textarea id="songThoughts" placeholder="What are you feeling about this song?" required></textarea>
                </div>
                <div class="form-group">
                    <label for="songLink">Link to Song (Optional)</label>
                    <input type="url" id="songLink" placeholder="https://www.youtube.com/watch?v=...">
                </div>
                <button type="submit">Add Song 🎸</button>
            </form>
        </div>

        <div id="latest-container"></div>

        <hr>

        <div class="search-container">
            <input type="text" class="search" id="searchInput" placeholder="Search by song, artist, or thoughts..." onkeyup="filterSongs()">
        </div>

        <div id="history-container" class="history-grid"></div>
    </div>
</div>

<script>
    const GITHUB_REPO = 'magnivy1/songish';
    const SONGS_FILE = 'songs.json';
    let githubToken = localStorage.getItem('githubToken');
    let songs = [];
    let isAuthenticated = false;

    // Always show main content and load songs (public access)
    document.getElementById('authContainer').style.display = 'none';
    document.getElementById('mainContent').style.display = 'block';
    loadSongs();

    // Check if authenticated (for editing)
    if (githubToken) {
        isAuthenticated = true;
        document.getElementById('logoutBtn').style.display = 'block';
        document.getElementById('loginBtn').style.display = 'none';
        document.querySelector('.form-container').style.display = 'block';
        document.getElementById('infoBanner').style.display = 'none';
    } else {
        document.getElementById('loginBtn').style.display = 'block';
        document.getElementById('logoutBtn').style.display = 'none';
        document.querySelector('.form-container').style.display = 'none';
        document.getElementById('infoBanner').style.display = 'block';
    }

    // Login button (in header)
    document.getElementById('loginBtn').addEventListener('click', function() {
        document.getElementById('authContainer').style.display = 'block';
        document.getElementById('mainContent').style.display = 'none';
    });

    // Login link (in info banner)
    document.getElementById('loginLink').addEventListener('click', function(e) {
        e.preventDefault();
        document.getElementById('authContainer').style.display = 'block';
        document.getElementById('mainContent').style.display = 'none';
    });

    // Set today's date
    if (document.getElementById('songDate')) {
        document.getElementById('songDate').valueAsDate = new Date();
    }

    // Authentication
    document.getElementById('authBtn').addEventListener('click', async function() {
        const token = document.getElementById('tokenInput').value.trim();
        if (!token) {
            alert('Please enter a GitHub token');
            return;
        }

        // Test token
        try {
            const response = await fetch('https://api.github.com/user', {
                headers: { 'Authorization': `token ${token}` }
            });
            if (response.ok) {
                githubToken = token;
                isAuthenticated = true;
                localStorage.setItem('githubToken', token);
                document.getElementById('authContainer').style.display = 'none';
                document.getElementById('mainContent').style.display = 'block';
                document.getElementById('logoutBtn').style.display = 'block';
                document.getElementById('loginBtn').style.display = 'none';
                document.querySelector('.form-container').style.display = 'block';
                loadSongs();
            } else {
                alert('Invalid token. Please check and try again.');
            }
        } catch (error) {
            alert('Error validating token: ' + error.message);
        }
    });

    // Cancel authentication
    document.getElementById('cancelAuthBtn').addEventListener('click', function() {
        document.getElementById('authContainer').style.display = 'none';
        document.getElementById('mainContent').style.display = 'block';
        document.getElementById('tokenInput').value = '';
    });

    // Logout
    document.getElementById('logoutBtn').addEventListener('click', function() {
        localStorage.removeItem('githubToken');
        githubToken = null;
        location.reload();
    });

    // Load songs from GitHub (public access)
    async function loadSongs() {
        try {
            // Try public API first (no authentication needed for viewing)
            const headers = {};
            if (githubToken && isAuthenticated) {
                headers['Authorization'] = `token ${githubToken}`;
            }

            const response = await fetch(
                `https://api.github.com/repos/${GITHUB_REPO}/contents/${SONGS_FILE}`,
                { headers }
            );

            if (response.ok) {
                const data = await response.json();
                const content = atob(data.content);
                songs = JSON.parse(content);
            } else {
                console.log('No songs file found or repo is private');
                songs = [];
            }
        } catch (error) {
            console.log('Error loading songs:', error);
            songs = [];
        }
        displaySongs(songs);
    }

    // Save songs to GitHub
    async function saveSongs() {
        try {
            // Get current file SHA for update
            let sha = null;
            try {
                const response = await fetch(
                    `https://api.github.com/repos/${GITHUB_REPO}/contents/${SONGS_FILE}`,
                    { headers: { 'Authorization': `token ${githubToken}` } }
                );
                if (response.ok) {
                    const data = await response.json();
                    sha = data.sha;
                }
            } catch (e) { }

            const updateResponse = await fetch(
                `https://api.github.com/repos/${GITHUB_REPO}/contents/${SONGS_FILE}`,
                {
                    method: 'PUT',
                    headers: {
                        'Authorization': `token ${githubToken}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        message: `Update songs - ${new Date().toLocaleDateString()}`,
                        content: btoa(JSON.stringify(songs, null, 2)),
                        ...(sha && { sha })
                    })
                }
            );

            if (!updateResponse.ok) {
                throw new Error('Failed to save to GitHub');
            }

            // Show success
            const successMsg = document.getElementById('successMessage');
            successMsg.classList.add('show');
            setTimeout(() => successMsg.classList.remove('show'), 3000);
        } catch (error) {
            alert('Error saving to GitHub: ' + error.message);
        }
    }

    // Form submission
    document.getElementById('songForm').addEventListener('submit', function(e) {
        e.preventDefault();
        
        const newSong = {
            date: formatDate(document.getElementById('songDate').value),
            title: document.getElementById('songTitle').value,
            thoughts: document.getElementById('songThoughts').value,
            link: document.getElementById('songLink').value || '#'
        };

        songs.unshift(newSong);
        saveSongs();

        document.getElementById('songForm').reset();
        document.getElementById('songDate').valueAsDate = new Date();
        displaySongs(songs);
    });

    function formatDate(dateString) {
        const date = new Date(dateString);
        return date.toLocaleDateString('en-US', { year: 'numeric', month: 'short', day: 'numeric' });
    }

    function displaySongs(data) {
        if (data.length === 0) {
            document.getElementById('latest-container').innerHTML = '';
            return;
        }

        const latest = data[0];
        const history = data.slice(1);

        document.getElementById('latest-container').innerHTML = `
            <div class="song-card">
                <div class="date">${latest.date}</div>
                <h2 style="font-family: 'Bangers'; font-size: 2.5rem; margin: 10px 0;">${latest.title}</h2>
                <p style="font-style: italic; font-size: 1.2rem; border-left: 4px solid var(--primary); padding-left: 15px;">
                    "${latest.thoughts}"
                </p>
                <a href="${latest.link}" class="btn" target="_blank">PLAY LOUD →</a>
            </div>
        `;

        renderHistory(history);
    }

    function renderHistory(items) {
        const container = document.getElementById('history-container');
        container.innerHTML = items.map((song, index) => `
            <div class="history-item">
                ${isAuthenticated ? `<button class="delete-btn" onclick="deleteSong(${index + 1})">✕</button>` : ''}
                <div class="date">${song.date}</div>
                <h3 style="margin: 5px 0;">${song.title}</h3>
                <p style="font-size: 0.9rem;">${song.thoughts}</p>
                <a href="${song.link}" style="color: var(--secondary); font-weight: bold;" target="_blank">Listen →</a>
            </div>
        `).join('');
    }

    function deleteSong(index) {
        if (confirm('Delete this song?')) {
            songs.splice(index, 1);
            saveSongs();
            displaySongs(songs);
        }
    }

    function filterSongs() {
        const query = document.getElementById('searchInput').value.toLowerCase();
        const filtered = songs.slice(1).filter(song => 
            song.title.toLowerCase().includes(query) || 
            song.thoughts.toLowerCase().includes(query)
        );
        renderHistory(filtered);
    }
</script>

</body>
</html>
