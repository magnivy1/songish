<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Songish</title>
</head>
<body>
    <h1>Save Your Song</h1>
    <input type="text" id="songTitle" placeholder="Enter song title" />
    <button id="saveSong">Save Song</button>

    <script>
        document.getElementById('saveSong').addEventListener('click', async () => {
            const title = document.getElementById('songTitle').value;
            if (title) {
                // Fetch the current songs from songs.json
                let response = await fetch('songs.json');
                let songs = await response.json();
                songs.push(title);

                // Save updated songs back to songs.json
                const blob = new Blob([JSON.stringify(songs, null, 2)], { type: 'application/json' });
                const formData = new FormData();
                formData.append('file', blob, 'songs.json');

                // Use GitHub API to save the blob
                await fetch('https://api.github.com/repos/magnivy1/songish/contents/songs.json', {
                    method: 'PUT',
                    headers: {
                        'Authorization': 'token YOUR_GITHUB_TOKEN',
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        message: 'Update songs.json with a new song',
                        content: btoa(JSON.stringify(songs, null, 2)),
                        sha: '706758f9770d19015a5afe0f7d3e02c57b2922b4'
                    })
                });

                alert('Song saved!');
            } else {
                alert('Please enter a song title.');
            }
        });
    </script>
</body>
</html>
