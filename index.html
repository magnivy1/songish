<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Song Viewer</title>
    <script>
        // Check for authentication token
        function checkAuthentication() {
            return localStorage.getItem('authToken') !== null;
        }

        // Function to toggle form visibility
        function toggleForm() {
            const form = document.getElementById('addSongForm');
            if (checkAuthentication()) {
                form.style.display = 'block';
            } else {
                form.style.display = 'none';
            }
        }

        // Load songs from songs.json
        async function loadSongs() {
            const response = await fetch('songs.json');
            const songs = await response.json();
            const songsContainer = document.getElementById('songs');
            songsContainer.innerHTML = songs.map(song => `<div>${song.title} - ${song.artist}</div>`).join('');
        }

        document.addEventListener('DOMContentLoaded', () => {
            toggleForm();
            loadSongs();
        });
    </script>
</head>
<body>
    <h1>Public Song Viewer</h1>
    <div id="songs"></div>
    <form id="addSongForm" style="display: none;">
        <input type="text" name="title" placeholder="Song Title" required />
        <input type="text" name="artist" placeholder="Artist" required />
        <button type="submit">Add Song</button>
        <input type="hidden" name="token" value="YOUR_TOKEN_HERE" />
    </form>
</body>
</html>
