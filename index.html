<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Songish</title>
</head>
<body>
    <h1>Welcome to Songish!</h1>
    <section id="song-input">
        <h2>Add a new song and comment:</h2>
        <input type="text" id="song-name" placeholder="Song Name" required>
        <input type="text" id="comment" placeholder="Your Comment" required>
        <button id="add-song">Add Song</button>
    </section>
    <section id="song-list">
        <h2>Today's Songs</h2>
        <ul id="songs"></ul>
    </section>

    <script>
        document.getElementById('add-song').addEventListener('click', function() {
            const songName = document.getElementById('song-name').value;
            const comment = document.getElementById('comment').value;
            const songList = document.getElementById('songs');

            if(songName && comment) {
                const li = document.createElement('li');
                li.textContent = `${songName} - ${comment}`;
                songList.appendChild(li);

                document.getElementById('song-name').value = ''; // Clear input
                document.getElementById('comment').value = ''; // Clear input
            } else {
                alert("Please fill in both fields.");
            }
        });
    </script>
</body>
</html>
