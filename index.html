<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Songish</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <h1>Welcome to Songish</h1>
    <div id="songs-container">
        <!-- Songs list will be populated here -->
    </div>
    
    <button id="login-btn">🔐 Login</button>

    <div id="login-modal" style="display:none;">
        <h2>Login</h2>
        <input type="password" id="password" placeholder="Enter your password">
        <button id="submit-password">Submit</button>
    </div>

    <div id="add-song-form" style="display:none;">
        <h2>Add a New Song</h2>
        <form>
            <input type="text" id="song-title" placeholder="Song Title" required>
            <button type="submit">Add Song</button>
        </form>
    </div>

    <script>
        const loginBtn = document.getElementById('login-btn');
        const loginModal = document.getElementById('login-modal');
        const addSongForm = document.getElementById('add-song-form');
        let authenticated = false; // Change this as per authentication logic

        loginBtn.onclick = () => {
            loginModal.style.display = 'block';
        };

        document.getElementById('submit-password').onclick = () => {
            const passwordInput = document.getElementById('password').value;
            // Simulate authentication check
            if (passwordInput === 'yourPassword') { // Replace 'yourPassword' with actual authentication logic
                authenticated = true;
                loginModal.style.display = 'none';
                addSongForm.style.display = 'block';
            } else {
                alert('Incorrect password');
            }
        };
    </script>
</body>
</html>
